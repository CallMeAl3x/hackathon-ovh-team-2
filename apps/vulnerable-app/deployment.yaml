apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: vulnerable-web }
  template:
    metadata:
      labels: { app: vulnerable-web }
    spec:
      containers:
        - name: web
          image: nginx:latest
          securityContext:
            runAsUser: 1001
            fsGroup: 1001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 80
