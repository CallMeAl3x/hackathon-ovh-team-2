apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-web
  template:
    metadata:
      labels:
        app: vulnerable-web
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: web
          image: nginxinc/nginx-unprivileged:1.25
          securityContext:
            runAsUser: 101
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
